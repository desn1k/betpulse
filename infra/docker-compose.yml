# Local development stack.
#
# Phase 1 brings up the core infrastructure (postgres, redis, minio, mlflow)
# plus the two application services (api, web) with health checks. Workers,
# scheduler and Caddy are wired in the phases that need them
# (see docker-compose.prod.yml for the reverse proxy).
#
# Env values come from the repository-root .env file (copy from .env.example).

name: betpulse

services:
  postgres:
    # TimescaleDB extension available from day one for live probability and
    # odds-movement time-series (enabled via migration in Phase 3).
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-football}
      POSTGRES_USER: ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the dedicated `mlflow` metadata database on first init.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football} -d ${POSTGRES_DB:-football}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: create the MinIO buckets MLflow (and backups) need on startup.
  createbuckets:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY};
      mc mb --ignore-existing local/${S3_BUCKET_ARTIFACTS:-ml-artifacts};
      mc mb --ignore-existing local/${S3_BUCKET_BACKUPS:-backups};
      "
    restart: "no"

  mlflow:
    # Tracking metadata → Postgres (queryable); model artifacts → MinIO/S3.
    # MLflow never writes artifacts to local disk (required for rollback, §16/§17).
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    command: >
      server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg://${POSTGRES_USER:-football}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --artifacts-destination s3://${S3_BUCKET_ARTIFACTS:-ml-artifacts}/mlflow
      --serve-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ARQ worker: processes the `train` queue and runs the nightly champion
  # re-evaluation cron. The cron takes a Redis lock (with a TTL), so extra
  # worker replicas are safe hot standbys rather than duplicate schedulers (§18).
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["arq", "app.workers.arq_app.WorkerSettings"]
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
